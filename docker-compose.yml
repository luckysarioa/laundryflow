# ==========================================================
# LaundryFlow — Docker Compose (untuk Coolify / self-host)
#
# Arsitektur: COOLIFY PROXY (Traefik) terminate TLS, routing 2 domain:
#   - app.domain.com  → frontend:3000 (Next.js)
#   - api.domain.com  → backend:80   (Laravel API)
#
# Service yang berjalan:
#   1. db        — MySQL 8 (database persisten via volume)
#   2. backend   — Laravel API (Apache, port 80) — exposable ke host
#   3. queue     — Laravel queue worker (WhatsApp async) — image sama, command beda
#   4. frontend  — Next.js PWA (port 3000) — exposable ke host
#   5. backup    — cron mysqldump (backup DB otomatis)
#
# Tidak ada reverse proxy internal — Coolify yang mengatur domain & HTTPS.
# ==========================================================

# Anchor: env database dibagi antara backend & queue (DRY).
x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_KEY: ${APP_KEY}
  APP_URL: ${APP_URL}
  APP_TIMEZONE: Asia/Jakarta
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  # CORS: origin frontend yang diizinkan (untuk arsitektur 2-domain).
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
  SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-}
  SESSION_DOMAIN: ${SESSION_DOMAIN:-}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-false}
  # URL frontend (untuk link tracking di pesan WhatsApp).
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
  # Midtrans (opsional — fitur langganan berbayar).
  MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY:-}
  MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY:-}
  MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION:-false}
  MIDTRANS_SNAP_URL: ${MIDTRANS_SNAP_URL:-https://app.sandbox.midtrans.com/snap/sheet.js}
  MIDTRANS_API_URL: ${MIDTRANS_API_URL:-https://api.sandbox.midtrans.com}
  MIDTRANS_NOTIFICATION_SECRET: ${MIDTRANS_NOTIFICATION_SECRET:-}
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  SESSION_DRIVER: database

services:
  # ---------- Database ----------
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # mysqladmin baca password dari env MYSQL_PWD (native MySQL client behavior)
      # → password tidak muncul di process list. mysql:8.0 root pakai caching_sha2
      # yang butuh password; tanpa ini healthcheck bisa fail → backend/backup tak start.
      test: ["CMD-SHELL", "MYSQL_PWD=$$MYSQL_ROOT_PASSWORD mysqladmin ping -h localhost -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - laundryflow

  # ---------- Backend API (Laravel) ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: laundryflow-backend:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
    volumes:
      # Persistent storage: foto order & file upload TIDAK hilang saat redeploy.
      backend_storage:/var/www/html/storage/app/public
    ports:
      # Coolify map domain (mis. api.domain.com) ke port host ini → 80 di container.
      - "${BACKEND_PORT:-8081}:80"
    healthcheck:
      # Route /up adalah health endpoint bawaan Laravel.
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - laundryflow

  # ---------- Queue Worker (job WhatsApp async) ----------
  # Container terpisah, REUSE image backend (tidak rebuild duplikat).
  queue:
    image: laundryflow-backend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      <<: *backend-env
    # Override entrypoint: tunggu DB siap, cache config (konsisten dgn backend), lalu queue:work.
    entrypoint: ["sh", "-c"]
    command:
      - |
        until php artisan migrate --force; do
          echo "[queue] Menunggu database siap..."; sleep 3;
        done
        echo "[queue] Cache config & route (konsisten dgn backend)..."
        php artisan config:cache
        php artisan route:cache
        echo "[queue] Memulai queue worker..."
        php artisan queue:work --tries=3 --backoff=30
    networks:
      - laundryflow

  # ---------- Frontend (Next.js PWA) ----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* dipanggang saat build. Dengan proxy /api (rewrites),
        # API_URL cukup "/api" (relatif, same-origin) → tidak perlu domain backend publik.
        # Alternatif 2-domain: set NEXT_PUBLIC_API_URL=https://api.domainanda.com/api
        # dan biarkan BACKEND_URL kosong (proxy dilewati bila sama dgn origin — tidak terjadi).
        NEXT_PUBLIC_USE_MOCK: ${NEXT_PUBLIC_USE_MOCK:-false}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        # Tujuan proxy /api/* (server-side, internal Docker). Default: service backend.
        BACKEND_URL: ${BACKEND_URL:-http://backend:80}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Coolify map domain (mis. app.domain.com) ke port host ini.
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - laundryflow

  # ---------- Backup Service (cron mysqldump) ----------
  # Backup DB otomatis sesuai BACKUP_SCHEDULE (default tiap hari 01:00).
  # Backup tersimpan di volume 'backup_data' (persistent, aman saat redeploy).
  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_DIR: /backups
      BACKUP_SCHEDULE: ${BACKUP_SCHEDULE:-0 1 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_COMPRESS: ${BACKUP_COMPRESS:-gzip}
      BACKUP_ON_START: ${BACKUP_ON_START:-true}
    volumes:
      - backup_data:/backups
    networks:
      - laundryflow

volumes:
  db_data:
  backend_storage:
  backup_data:

networks:
  laundryflow:
    driver: bridge
